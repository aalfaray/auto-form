<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test 1 - Formulario de Registro</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        background: #f8f9fa;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #202124;
      }
      input,
      select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 14px;
      }
      input:focus {
        outline: none;
        border-color: #4285f4;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row .form-group {
        flex: 1;
      }
      button {
        background: #4285f4;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #3367d6;
      }
      h1 {
        color: #202124;
        font-size: 24px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <h1>Formulario de Registro</h1>
    <form id="registerForm">
      <div class="row">
        <div class="form-group">
          <label for="firstName">Nombre</label>
          <input
            type="text"
            id="firstName"
            name="first_name"
            placeholder="Tu nombre"
            required
          />
        </div>
        <div class="form-group">
          <label for="lastName">Apellido</label>
          <input
            type="text"
            id="lastName"
            name="last_name"
            placeholder="Tu apellido"
            required
          />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
          required
        />
      </div>
      <div class="form-group">
        <label for="phone">Teléfono</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="+34 600 000 000"
        />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Mínimo 8 caracteres"
          minlength="8"
          required
        />
      </div>
      <div class="form-group">
        <label for="birthdate">Fecha de nacimiento</label>
        <input type="date" id="birthdate" name="birthdate" />
      </div>
      <div class="form-group">
        <label for="gender">Género</label>
        <select id="gender" name="gender">
          <option value="">Seleccionar...</option>
          <option value="male">Masculino</option>
          <option value="female">Femenino</option>
          <option value="other">Otro</option>
        </select>
      </div>
      <button type="submit">Registrarse</button>
    </form>
  </body>
</html>
