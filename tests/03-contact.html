<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test 3 - Formulario de Contacto</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        max-width: 550px;
        margin: 40px auto;
        padding: 20px;
        background: #f8f9fa;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #202124;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 14px;
      }
      textarea {
        min-height: 100px;
        resize: vertical;
      }
      button {
        background: #4285f4;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }
      h1 {
        color: #202124;
        font-size: 24px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <h1>Formulario de Contacto</h1>
    <form id="contactForm">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Tu nombre completo"
          required
        />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="tu@email.com"
          required
        />
      </div>
      <div class="form-group">
        <label for="phone">Teléfono (opcional)</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="+34 600 000 000"
        />
      </div>
      <div class="form-group">
        <label for="subject">Asunto</label>
        <select id="subject" name="subject">
          <option value="">Seleccionar asunto</option>
          <option value="support">Soporte técnico</option>
          <option value="sales">Ventas</option>
          <option value="billing">Facturación</option>
          <option value="other">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea
          id="message"
          name="message"
          placeholder="Escribe tu mensaje aquí..."
          required
        ></textarea>
      </div>
      <button type="submit">Enviar mensaje</button>
    </form>
  </body>
</html>
