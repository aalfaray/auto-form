<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test 2 - Formulario de Checkout</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 20px;
        background: #f8f9fa;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
        color: #202124;
      }
      input,
      select {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        font-size: 14px;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row .form-group {
        flex: 1;
      }
      h2 {
        color: #202124;
        font-size: 18px;
        margin: 24px 0 12px;
        border-bottom: 2px solid #4285f4;
        padding-bottom: 8px;
      }
      button {
        background: #34a853;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
      }
      button:hover {
        background: #2d9249;
      }
      h1 {
        color: #202124;
        font-size: 24px;
        margin-bottom: 24px;
      }
    </style>
  </head>
  <body>
    <h1>Formulario de Compra</h1>
    <form id="checkoutForm">
      <h2>Datos de Envío</h2>
      <div class="form-group">
        <label for="fullName">Nombre completo</label>
        <input
          type="text"
          id="fullName"
          name="full_name"
          autocomplete="name"
          required
        />
      </div>
      <div class="form-group">
        <label for="address">Dirección</label>
        <input
          type="text"
          id="address"
          name="address"
          autocomplete="street-address"
          placeholder="Calle, número, piso"
          required
        />
      </div>
      <div class="row">
        <div class="form-group">
          <label for="city">Ciudad</label>
          <input
            type="text"
            id="city"
            name="city"
            autocomplete="address-level2"
            required
          />
        </div>
        <div class="form-group">
          <label for="state">Provincia / Estado</label>
          <input
            type="text"
            id="state"
            name="state"
            autocomplete="address-level1"
            required
          />
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label for="zip">Código Postal</label>
          <input
            type="text"
            id="zip"
            name="zip"
            autocomplete="postal-code"
            required
          />
        </div>
        <div class="form-group">
          <label for="country">País</label>
          <select id="country" name="country" autocomplete="country">
            <option value="">Seleccionar país</option>
            <option value="ES">España</option>
            <option value="MX">México</option>
            <option value="AR">Argentina</option>
            <option value="CO">Colombia</option>
            <option value="US">Estados Unidos</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label for="phone">Teléfono de contacto</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" />
      </div>

      <h2>Datos de Pago</h2>
      <div class="form-group">
        <label for="cardNumber">Número de tarjeta</label>
        <input
          type="text"
          id="cardNumber"
          name="card_number"
          placeholder="1234 5678 9012 3456"
          autocomplete="cc-number"
        />
      </div>
      <div class="row">
        <div class="form-group">
          <label for="cardExpiry">Fecha de expiración</label>
          <input
            type="text"
            id="cardExpiry"
            name="card_expiry"
            placeholder="MM/AA"
            autocomplete="cc-exp"
          />
        </div>
        <div class="form-group">
          <label for="cvv">CVV</label>
          <input
            type="text"
            id="cvv"
            name="cvv"
            placeholder="123"
            autocomplete="cc-csc"
            maxlength="4"
          />
        </div>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" name="terms" required /> Acepto los términos y
          condiciones
        </label>
      </div>
      <button type="submit">Realizar pedido</button>
    </form>
  </body>
</html>
